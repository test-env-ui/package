<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Проверка упаковки</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --purple-1:#6A00FF;--purple-2:#8A2BE2;--purple-3:#A855F7;
  --bg:#f5f4f8;--card:#fff;--text:#1b1b1f;--muted:#6c6c77;
  --border:#e5e5ea;--shadow:0 6px 20px rgba(19,19,33,.07);
  --radius:16px;--radius-sm:10px;
}
html{font-size:14px}
body{font-family:'Segoe UI',Roboto,Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* ── Header ── */
.topbar{
  position:sticky;top:0;z-index:50;
  background:linear-gradient(135deg,var(--purple-1) 0%,var(--purple-2) 50%,var(--purple-3) 100%);
  padding:0 32px;height:64px;display:flex;align-items:center;gap:16px;
  color:#fff;
}
.topbar h1{font-size:1.35rem;font-weight:700;letter-spacing:-.3px}

/* ── Filters bar ── */
.filters-bar{
  position:sticky;top:64px;z-index:40;
  background:var(--card);border-bottom:1px solid var(--border);
  padding:14px 32px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;
}
.filter-group{display:flex;flex-direction:column;gap:4px;position:relative}
.filter-label{font-size:.72rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.filter-input{
  border:1.5px solid var(--border);border-radius:var(--radius-sm);
  padding:8px 14px;font-size:.9rem;background:#fff;color:var(--text);
  outline:none;transition:border-color .2s;
}
.filter-input:focus{border-color:var(--purple-2)}
.btn-load{
  background:linear-gradient(135deg,var(--purple-1),var(--purple-2));
  color:#fff;border:none;border-radius:999px;padding:10px 28px;
  font-size:.9rem;font-weight:600;cursor:pointer;transition:opacity .2s;
  display:flex;align-items:center;gap:8px;
}
.btn-load:hover{opacity:.88}
.btn-load svg{width:16px;height:16px}

/* ── Warehouse dropdown ── */
.wh-selector{position:relative}
.wh-toggle{
  border:1.5px solid var(--border);border-radius:var(--radius-sm);
  padding:8px 36px 8px 14px;font-size:.9rem;background:#fff;color:var(--text);
  cursor:pointer;min-width:200px;position:relative;user-select:none;
}
.wh-toggle::after{content:'▾';position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--muted)}
.wh-dropdown{
  display:none;position:absolute;top:calc(100% + 4px);left:0;
  background:#fff;border:1px solid var(--border);border-radius:var(--radius-sm);
  box-shadow:var(--shadow);width:320px;z-index:100;padding:12px;
}
.wh-dropdown.open{display:block}
.wh-search{
  width:100%;border:1px solid var(--border);border-radius:8px;
  padding:8px 12px;font-size:.85rem;margin-bottom:8px;outline:none;
}
.wh-search:focus{border-color:var(--purple-2)}
.wh-list{max-height:200px;overflow-y:auto;display:flex;flex-direction:column;gap:4px}
.wh-item{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:6px;cursor:pointer;font-size:.85rem}
.wh-item:hover{background:#f3f0ff}
.wh-item input{accent-color:var(--purple-2)}
.wh-actions{display:flex;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.wh-actions button{
  flex:1;padding:7px;border-radius:8px;font-size:.8rem;font-weight:600;cursor:pointer;border:none;
}
.wh-btn-all{background:#f3f0ff;color:var(--purple-1)}
.wh-btn-apply{background:var(--purple-2);color:#fff}

/* ── Tabs ── */
.tabs-bar{
  display:flex;gap:0;border-bottom:2px solid var(--border);
  padding:0 32px;background:var(--card);
}
.tab-btn{
  padding:14px 24px;font-size:.95rem;font-weight:600;color:var(--muted);
  background:none;border:none;cursor:pointer;position:relative;transition:color .2s;
}
.tab-btn.active{color:var(--purple-1)}
.tab-btn.active::after{
  content:'';position:absolute;bottom:-2px;left:0;right:0;
  height:3px;background:var(--purple-1);border-radius:3px 3px 0 0;
}
.tab-btn:hover{color:var(--purple-2)}

/* ── Content ── */
.content{padding:24px 32px;max-width:1400px;margin:0 auto}
.tab-pane{display:none}
.tab-pane.active{display:block}

/* ── KPI Cards ── */
.kpi-row{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px}
.kpi-card{
  background:var(--card);border-radius:var(--radius);padding:20px 24px;
  box-shadow:var(--shadow);display:flex;flex-direction:column;gap:6px;
}
.kpi-card .kpi-label{font-size:.8rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.kpi-card .kpi-value{font-size:2rem;font-weight:700}
.kpi-card.purple .kpi-value{color:var(--purple-1)}
.kpi-card.green .kpi-value{color:#16a34a}
.kpi-card.red .kpi-value{color:#dc2626}

/* ── Chart ── */
.chart-card{
  background:var(--card);border-radius:var(--radius);padding:24px;
  box-shadow:var(--shadow);margin-bottom:24px;
}
.chart-card h3{font-size:1rem;font-weight:700;margin-bottom:16px}
.chart-wrap{position:relative;height:340px}

/* ── Detail section ── */
.detail-section{
  background:var(--card);border-radius:var(--radius);
  box-shadow:var(--shadow);overflow:hidden;
}
.detail-header{
  padding:18px 24px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.detail-header h3{font-size:1rem;font-weight:700}
.detail-filter-row{display:flex;gap:10px;align-items:center}
.detail-filter-row select,
.detail-filter-row input{
  border:1.5px solid var(--border);border-radius:8px;
  padding:6px 12px;font-size:.85rem;outline:none;
}
.detail-filter-row select:focus,
.detail-filter-row input:focus{border-color:var(--purple-2)}

/* ── Table ── */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead th{
  padding:12px 16px;text-align:left;font-size:.78rem;
  color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.4px;
  border-bottom:2px solid var(--border);background:#fafafa;
  position:sticky;top:0;cursor:pointer;white-space:nowrap;user-select:none;
}
thead th:hover{color:var(--purple-1)}
thead th .sort-icon{margin-left:4px;font-size:.7rem}
tbody tr{border-bottom:1px solid var(--border);transition:background .15s}
tbody tr:hover{background:#f8f6ff}
tbody td{padding:11px 16px;font-size:.88rem;white-space:nowrap}
tbody td.wrap{white-space:normal;max-width:200px}
.status-badge{
  display:inline-block;padding:3px 10px;border-radius:999px;
  font-size:.75rem;font-weight:600;
}
.status-badge.request{background:#ede9fe;color:#6d28d9}
.status-badge.packed{background:#dcfce7;color:#15803d}
.status-badge.not-packed{background:#fee2e2;color:#b91c1c}

/* ── Photo ── */
.photo-thumb{
  width:48px;height:48px;border-radius:8px;object-fit:cover;
  cursor:pointer;border:2px solid var(--border);transition:transform .2s;
}
.photo-thumb:hover{transform:scale(1.1)}
.no-photo{color:var(--muted);font-size:.8rem;font-style:italic}

/* ── Photo modal ── */
.photo-modal{
  display:none;position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,.7);align-items:center;justify-content:center;
}
.photo-modal.open{display:flex}
.photo-modal img{max-width:90vw;max-height:85vh;border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.photo-modal .close-btn{
  position:absolute;top:20px;right:28px;color:#fff;font-size:2rem;
  cursor:pointer;background:none;border:none;line-height:1;
}

/* ── Search tab ── */
.search-box{
  display:flex;gap:12px;align-items:center;margin-bottom:24px;justify-content:flex-start;
}
.search-input{
  border:1.5px solid var(--border);border-radius:var(--radius-sm);
  padding:12px 18px;font-size:1rem;width:360px;outline:none;
  transition:border-color .2s;
}
.search-input:focus{border-color:var(--purple-2)}
.search-input::placeholder{color:#bbb}
.btn-search{
  background:linear-gradient(135deg,var(--purple-1),var(--purple-2));
  color:#fff;border:none;border-radius:999px;padding:12px 28px;
  font-size:.9rem;font-weight:600;cursor:pointer;
  display:flex;align-items:center;gap:8px;transition:opacity .2s;
}
.btn-search:hover{opacity:.88}

/* ── Pagination ── */
.pagination{
  display:flex;align-items:center;justify-content:center;gap:6px;
  padding:16px 24px;border-top:1px solid var(--border);
}
.pagination button{
  width:36px;height:36px;border:1px solid var(--border);border-radius:8px;
  background:#fff;cursor:pointer;font-size:.85rem;font-weight:600;
  color:var(--muted);transition:all .15s;
}
.pagination button:hover{border-color:var(--purple-2);color:var(--purple-2)}
.pagination button.active{background:var(--purple-1);color:#fff;border-color:var(--purple-1)}
.pagination button:disabled{opacity:.4;cursor:default}
.pagination .page-info{font-size:.82rem;color:var(--muted);margin:0 8px}

/* ── Responsive ── */
@media(max-width:900px){
  .kpi-row{grid-template-columns:1fr}
  .content{padding:16px}
  .topbar,.filters-bar,.tabs-bar{padding-left:16px;padding-right:16px}
  .search-input{width:100%;flex:1}
}
@media(max-width:600px){
  .filters-bar{flex-direction:column;align-items:stretch}
  .btn-load{margin-left:0}
}
</style>
</head>
<body>

<!-- Header -->
<div class="topbar">
  <h1>Проверка упаковки</h1>
</div>

<!-- Filters -->
<div class="filters-bar">
  <div class="filter-group wh-selector">
    <span class="filter-label">Склад</span>
    <div class="wh-toggle" id="whToggle">Выбраны все</div>
    <div class="wh-dropdown" id="whDropdown">
      <input class="wh-search" placeholder="Поиск склада..." id="whSearch">
      <div class="wh-list" id="whList"></div>
      <div class="wh-actions">
        <button class="wh-btn-all" onclick="whSelectAll()">Выбрать все</button>
        <button class="wh-btn-apply" onclick="whApply()">Применить</button>
      </div>
    </div>
  </div>
  <div class="filter-group">
    <span class="filter-label">Период</span>
    <div style="display:flex;gap:8px;align-items:center">
      <input type="date" class="filter-input" id="dateFrom" value="2026-02-19">
      <span style="color:var(--muted)">—</span>
      <input type="date" class="filter-input" id="dateTo" value="2026-03-04">
    </div>
  </div>
  <button class="btn-load" onclick="loadData()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
    Обновить
  </button>
</div>

<!-- Tabs -->
<div class="tabs-bar">
  <button class="tab-btn active" data-tab="chart" onclick="switchTab('chart',this)">График</button>
  <button class="tab-btn" data-tab="search" onclick="switchTab('search',this)">Поиск по поступлению</button>
</div>

<!-- Content -->
<div class="content">

  <!-- Tab 1: Chart -->
  <div class="tab-pane active" id="tab-chart">
    <div class="kpi-row">
      <div class="kpi-card purple">
        <span class="kpi-label">Запросы на проверку</span>
        <span class="kpi-value" id="kpiRequests">0</span>
      </div>
      <div class="kpi-card green">
        <span class="kpi-label">Упаковано от поставщика</span>
        <span class="kpi-value" id="kpiPacked">0</span>
      </div>
      <div class="kpi-card red">
        <span class="kpi-label">Не упаковано от поставщика</span>
        <span class="kpi-value" id="kpiNotPacked">0</span>
      </div>
    </div>

    <div class="chart-card">
      <h3>Динамика проверки упаковки</h3>
      <div class="chart-wrap">
        <canvas id="mainChart"></canvas>
      </div>
    </div>

    <div class="detail-section">
      <div class="detail-header">
        <h3>Детализация</h3>
        <div class="detail-filter-row">
          <select id="filterStatus">
            <option value="">Все статусы</option>
            <option value="request">Запрос на проверку</option>
            <option value="packed">Упаковано</option>
            <option value="not-packed">Не упаковано</option>
          </select>
          <input type="text" placeholder="Поиск по поставке / сотруднику..." id="filterText" style="width:260px">
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th onclick="sortTable('date')">Дата <span class="sort-icon">↕</span></th>
              <th onclick="sortTable('delivery')">Поставка <span class="sort-icon">↕</span></th>
              <th onclick="sortTable('employee')">Сотрудник <span class="sort-icon">↕</span></th>
              <th onclick="sortTable('qty')">Кол-во <span class="sort-icon">↕</span></th>
              <th onclick="sortTable('status')">Статус <span class="sort-icon">↕</span></th>
              <th>Фото</th>
            </tr>
          </thead>
          <tbody id="detailBody"></tbody>
        </table>
      </div>
      <div class="pagination" id="detailPagination"></div>
    </div>
  </div>

  <!-- Tab 2: Search -->
  <div class="tab-pane" id="tab-search">
    <div class="search-box">
      <input type="text" class="search-input" id="searchInput" placeholder="Номер поступления*">
      <button class="btn-search" onclick="doSearch()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        Искать
      </button>
    </div>

    <div id="searchResults">
      <div class="detail-section" id="searchTable">
        <div class="detail-header">
          <h3 id="searchResultTitle">Результаты поиска</h3>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Дата</th>
                <th>Поставка</th>
                <th>Сотрудник</th>
                <th>Кол-во</th>
                <th>Статус</th>
                <th>Фото</th>
              </tr>
            </thead>
            <tbody id="searchBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Photo modal -->
<div class="photo-modal" id="photoModal" onclick="closePhoto()">
  <button class="close-btn" onclick="closePhoto()">&times;</button>
  <img id="photoModalImg" src="" alt="Фото">
</div>

<script>
/* ─── State ─── */
const WAREHOUSES = [
  'Склад Москва-1','Склад Москва-2','Склад СПб','Склад Казань',
  'Склад Новосибирск','Склад Екатеринбург','Склад Краснодар',
  'Склад Самара','Склад Ростов-на-Дону','Склад Нижний Новгород'
];
const EMPLOYEES = [
  'Иванов А.С.','Петров В.Н.','Сидорова Е.А.','Козлов Д.М.',
  'Новикова О.П.','Фёдоров И.К.','Морозова Т.В.','Волков Р.Л.',
  'Алексеева М.Ю.','Лебедев С.Г.','Кузнецов П.А.','Соколова Н.И.'
];
const SUPPLIERS = [
  'ООО "ТехноПоставка"','ИП Сергеев','ООО "СтройМатериал"',
  'ЗАО "Комплект-Сервис"','ООО "Альфа-Логистика"','ИП Козлова',
  'ООО "ГлобалТрейд"','ООО "РусПоставка"'
];
// Placeholder photos for demo
const PHOTOS = [
  'https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?w=400&h=400&fit=crop',
  'https://images.unsplash.com/photo-1580901368919-7738efb0f228?w=400&h=400&fit=crop',
  'https://images.unsplash.com/photo-1607166452427-7e4477c2cc4f?w=400&h=400&fit=crop',
  'https://images.unsplash.com/photo-1553062407-98eeb64c6a62?w=400&h=400&fit=crop',
  'https://images.unsplash.com/photo-1595246140625-573b715d11dc?w=400&h=400&fit=crop',
  'https://images.unsplash.com/photo-1616401784845-180882c6e3f2?w=400&h=400&fit=crop',
];

let state = {
  warehouses: new Set(WAREHOUSES),
  data: [],
  filtered: [],
  sortKey: 'date',
  sortDir: -1,
  page: 1,
  perPage: 20,
};
let chartInstance = null;

/* ─── Helpers ─── */
const fmt = new Intl.NumberFormat('ru-RU');
const pick = arr => arr[Math.floor(Math.random()*arr.length)];
const rint = (min,max) => Math.floor(Math.random()*(max-min+1))+min;
const isoDate = d => d.toISOString().slice(0,10);
const fmtDate = iso => {
  const [y,m,d] = iso.split('-');
  return `${d}.${m}.${y}`;
};

function eachDay(from, to) {
  const days = [];
  let d = new Date(from);
  const end = new Date(to);
  while (d <= end) { days.push(isoDate(d)); d.setDate(d.getDate()+1); }
  return days;
}

/* ─── Generate mock data ─── */
function generateData() {
  const from = document.getElementById('dateFrom').value;
  const to = document.getElementById('dateTo').value;
  const days = eachDay(from, to);
  const data = [];
  let receiptId = 100000;

  days.forEach(day => {
    const deliveriesCount = rint(8, 20);
    for (let i = 0; i < deliveriesCount; i++) {
      receiptId++;
      const r = Math.random();
      let status;
      if (r < 0.25) status = 'request';
      else if (r < 0.70) status = 'packed';
      else status = 'not-packed';

      data.push({
        date: day,
        delivery: receiptId.toString(),
        receipt: receiptId.toString(),
        supplier: pick(SUPPLIERS),
        employee: pick(EMPLOYEES),
        qty: rint(1, 200),
        status,
        photo: status === 'not-packed' ? pick(PHOTOS) : null,
        warehouse: pick([...state.warehouses]),
      });
    }
  });
  return data;
}

/* ─── Init warehouses ─── */
function initWarehouses() {
  const list = document.getElementById('whList');
  list.innerHTML = WAREHOUSES.map(w =>
    `<label class="wh-item"><input type="checkbox" checked value="${w}"> ${w}</label>`
  ).join('');
}

function whSelectAll() {
  document.querySelectorAll('#whList input').forEach(cb => cb.checked = true);
}
function whApply() {
  const checked = [...document.querySelectorAll('#whList input:checked')].map(cb => cb.value);
  state.warehouses = new Set(checked);
  const toggle = document.getElementById('whToggle');
  toggle.textContent = checked.length === WAREHOUSES.length
    ? 'Выбраны все'
    : `Выбрано: ${checked.length}`;
  document.getElementById('whDropdown').classList.remove('open');
  loadData();
}

document.getElementById('whToggle').addEventListener('click', () => {
  document.getElementById('whDropdown').classList.toggle('open');
});
document.getElementById('whSearch').addEventListener('input', e => {
  const q = e.target.value.toLowerCase();
  document.querySelectorAll('#whList .wh-item').forEach(item => {
    item.style.display = item.textContent.toLowerCase().includes(q) ? '' : 'none';
  });
});
document.addEventListener('click', e => {
  const sel = document.querySelector('.wh-selector');
  if (!sel.contains(e.target)) document.getElementById('whDropdown').classList.remove('open');
});

/* ─── Load data ─── */
function loadData() {
  state.data = generateData();
  state.page = 1;
  updateKPIs();
  updateChart();
  applyDetailFilters();
}

/* ─── KPIs ─── */
function updateKPIs() {
  const d = state.data.filter(r => state.warehouses.has(r.warehouse));
  const requests = d.filter(r => r.status === 'request').reduce((s,r) => s+r.qty, 0);
  const packed = d.filter(r => r.status === 'packed').reduce((s,r) => s+r.qty, 0);
  const notPacked = d.filter(r => r.status === 'not-packed').reduce((s,r) => s+r.qty, 0);
  document.getElementById('kpiRequests').textContent = fmt.format(requests);
  document.getElementById('kpiPacked').textContent = fmt.format(packed);
  document.getElementById('kpiNotPacked').textContent = fmt.format(notPacked);
}

/* ─── Chart ─── */
function updateChart() {
  const d = state.data.filter(r => state.warehouses.has(r.warehouse));
  const from = document.getElementById('dateFrom').value;
  const to = document.getElementById('dateTo').value;
  const days = eachDay(from, to);

  const agg = {};
  days.forEach(day => agg[day] = {request:0, packed:0, 'not-packed':0});
  d.forEach(r => { if (agg[r.date]) agg[r.date][r.status] += r.qty; });

  const labels = days.map(fmtDate);
  const dsRequests = days.map(day => agg[day].request);
  const dsPacked = days.map(day => agg[day].packed);
  const dsNotPacked = days.map(day => agg[day]['not-packed']);

  if (chartInstance) chartInstance.destroy();

  const ctx = document.getElementById('mainChart').getContext('2d');
  chartInstance = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [
        {
          label: 'Запросы на проверку',
          data: dsRequests,
          borderColor: '#6A00FF',
          backgroundColor: 'rgba(106,0,255,0.1)',
          borderWidth: 2.5,
          pointRadius: 4,
          pointHoverRadius: 6,
          pointBackgroundColor: '#6A00FF',
          tension: 0.3,
          fill: false,
        },
        {
          label: 'Упаковано',
          data: dsPacked,
          borderColor: '#16a34a',
          backgroundColor: 'rgba(22,163,74,0.1)',
          borderWidth: 2.5,
          pointRadius: 4,
          pointHoverRadius: 6,
          pointBackgroundColor: '#16a34a',
          tension: 0.3,
          fill: false,
        },
        {
          label: 'Не упаковано',
          data: dsNotPacked,
          borderColor: '#dc2626',
          backgroundColor: 'rgba(220,38,38,0.1)',
          borderWidth: 2.5,
          pointRadius: 4,
          pointHoverRadius: 6,
          pointBackgroundColor: '#dc2626',
          tension: 0.3,
          fill: false,
        },
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: {
          position: 'top',
          labels: { usePointStyle: true, pointStyle: 'circle', padding: 20, font: { size: 13 } },
          onClick: (e, legendItem, legend) => {
            const index = legendItem.datasetIndex;
            const ci = legend.chart;
            const meta = ci.getDatasetMeta(index);
            meta.hidden = meta.hidden === null ? !ci.data.datasets[index].hidden : null;
            ci.update();
          }
        },
        tooltip: {
          backgroundColor: '#1b1b1f',
          padding: 12,
          titleFont: { size: 13 },
          bodyFont: { size: 12 },
          cornerRadius: 10,
          callbacks: {
            label: ctx => `${ctx.dataset.label}: ${fmt.format(ctx.raw)} шт.`
          }
        }
      },
      scales: {
        x: {
          grid: { display: false },
          ticks: { font: { size: 11 }, maxRotation: 45 }
        },
        y: {
          beginAtZero: true,
          grid: { color: '#f0f0f0' },
          ticks: { font: { size: 11 }, callback: v => fmt.format(v) }
        }
      }
    }
  });
}

/* ─── Detail table ─── */
const statusLabel = { request: 'Запрос на проверку', packed: 'Упаковано', 'not-packed': 'Не упаковано' };
const statusClass = { request: 'request', packed: 'packed', 'not-packed': 'not-packed' };

function applyDetailFilters() {
  const statusF = document.getElementById('filterStatus').value;
  const textF = document.getElementById('filterText').value.toLowerCase();
  let f = state.data.filter(r => state.warehouses.has(r.warehouse));
  if (statusF) f = f.filter(r => r.status === statusF);
  if (textF) f = f.filter(r =>
    r.delivery.toLowerCase().includes(textF) ||
    r.employee.toLowerCase().includes(textF) ||
    r.supplier.toLowerCase().includes(textF)
  );
  state.filtered = f;
  state.page = 1;
  sortFiltered();
  renderDetailTable();
}

function sortTable(key) {
  if (state.sortKey === key) state.sortDir *= -1;
  else { state.sortKey = key; state.sortDir = 1; }
  sortFiltered();
  renderDetailTable();
}

function sortFiltered() {
  const k = state.sortKey;
  const d = state.sortDir;
  state.filtered.sort((a,b) => {
    let va = a[k], vb = b[k];
    if (k === 'qty') return (va - vb) * d;
    if (typeof va === 'string') return va.localeCompare(vb,'ru') * d;
    return 0;
  });
}

function renderDetailTable() {
  const start = (state.page - 1) * state.perPage;
  const page = state.filtered.slice(start, start + state.perPage);
  const tbody = document.getElementById('detailBody');

  tbody.innerHTML = page.map(r => `
    <tr>
      <td>${fmtDate(r.date)}</td>
      <td><strong>${r.delivery}</strong><br><span style="font-size:.78rem;color:var(--muted)">${r.supplier}</span></td>
      <td>${r.employee}</td>
      <td>${fmt.format(r.qty)} шт.</td>
      <td><span class="status-badge ${statusClass[r.status]}">${statusLabel[r.status]}</span></td>
      <td>${r.photo
        ? `<img class="photo-thumb" src="${r.photo}" onclick="openPhoto('${r.photo}')" alt="Фото">`
        : '<span class="no-photo">—</span>'
      }</td>
    </tr>
  `).join('');

  renderPagination('detailPagination', state.filtered.length, state.page, p => {
    state.page = p;
    renderDetailTable();
  });
}

function renderPagination(containerId, total, current, onPage) {
  const totalPages = Math.ceil(total / state.perPage);
  const el = document.getElementById(containerId);
  if (totalPages <= 1) { el.innerHTML = ''; return; }

  let html = `<button ${current===1?'disabled':''} onclick="arguments[0].stopPropagation()">‹</button>`;
  const range = [];
  for (let i = 1; i <= totalPages; i++) {
    if (i === 1 || i === totalPages || (i >= current-2 && i <= current+2)) range.push(i);
    else if (range[range.length-1] !== '...') range.push('...');
  }
  range.forEach(p => {
    if (p === '...') html += `<span class="page-info">…</span>`;
    else html += `<button class="${p===current?'active':''}">${p}</button>`;
  });
  html += `<button ${current===totalPages?'disabled':''}>›</button>`;
  html += `<span class="page-info">${fmt.format(total)} записей</span>`;
  el.innerHTML = html;

  el.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => {
      const txt = btn.textContent;
      if (txt === '‹') onPage(current - 1);
      else if (txt === '›') onPage(current + 1);
      else { const n = parseInt(txt); if (!isNaN(n)) onPage(n); }
    });
  });
}

document.getElementById('filterStatus').addEventListener('change', applyDetailFilters);
document.getElementById('filterText').addEventListener('input', applyDetailFilters);

/* ─── Tab switching ─── */
function switchTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-'+tab).classList.add('active');
}

/* ─── Search tab ─── */
function doSearch() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return;

  const results = state.data.filter(r =>
    r.receipt.includes(q) || r.delivery.toLowerCase().includes(q.toLowerCase())
  );

  if (results.length === 0) {
    document.getElementById('searchResultTitle').textContent = `По запросу "${q}" ничего не найдено`;
    document.getElementById('searchBody').innerHTML = '';
    return;
  }

  document.getElementById('searchResultTitle').textContent = `Результаты: ${results.length} записей по "${q}"`;

  const tbody = document.getElementById('searchBody');
  tbody.innerHTML = results.map(r => `
    <tr>
      <td>${fmtDate(r.date)}</td>
      <td><strong>${r.delivery}</strong><br><span style="font-size:.78rem;color:var(--muted)">${r.supplier}</span></td>
      <td>${r.employee}</td>
      <td>${fmt.format(r.qty)} шт.</td>
      <td><span class="status-badge ${statusClass[r.status]}">${statusLabel[r.status]}</span></td>
      <td>${r.photo
        ? `<img class="photo-thumb" src="${r.photo}" onclick="openPhoto('${r.photo}')" alt="Фото">`
        : '<span class="no-photo">—</span>'
      }</td>
    </tr>
  `).join('');
}

document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});

/* ─── Photo modal ─── */
function openPhoto(src) {
  document.getElementById('photoModalImg').src = src;
  document.getElementById('photoModal').classList.add('open');
}
function closePhoto() {
  document.getElementById('photoModal').classList.remove('open');
}
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closePhoto();
});

/* ─── Init ─── */
initWarehouses();
loadData();
</script>
</body>
